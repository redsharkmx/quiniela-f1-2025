<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiniela F1 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red: #E10600; --black: #15151E; --gray: #2A2A35;
      --silver: #C0C0C8; --white: #FFFFFF; --gold: #FFD700; --cyan: #00F5FF;
    }
    body {
      font-family: 'Rajdhani', sans-serif; background: var(--black);
      color: var(--white); min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    h1, h2, h3 { font-family: 'Bebas Neue'; letter-spacing: 2px; text-transform: uppercase; }
    h1 { font-size: 3rem; color: var(--red); }
    .header { text-align: center; padding: 40px 20px; border-bottom: 3px solid var(--red); margin-bottom: 40px; }
    .nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
    .btn-nav { padding: 12px 25px; background: var(--gray); color: var(--white); border: 2px solid var(--red);
      cursor: pointer; font-weight: bold; text-transform: uppercase; transition: all 0.3s; }
    .btn-nav:hover, .btn-nav.active { background: var(--red); border-color: var(--cyan); }
    .btn { padding: 15px 30px; background: var(--red); color: var(--white); border: none;
      cursor: pointer; font-weight: bold; font-size: 1rem; text-transform: uppercase; width: 100%; transition: all 0.3s; }
    .btn:hover { background: #ff1a00; transform: scale(1.02); }
    .card { background: var(--gray); border: 2px solid var(--silver); padding: 30px; margin-bottom: 20px;
      border-top: 4px solid var(--red); }
    .card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,245,255,0.2); }
    .form-group { margin-bottom: 20px; }
    label { display: block; color: var(--cyan); font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
    input, select { width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
      border: 2px solid var(--silver); color: var(--white); font-family: 'Rajdhani';
      transition: all 0.3s; }
    input:focus, select:focus { outline: none; border-color: var(--red); background: rgba(225,6,0,0.1); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
    .card-small { background: var(--gray); border: 2px solid var(--silver); padding: 20px;
      cursor: pointer; transition: all 0.3s; }
    .card-small:hover { transform: translateY(-5px); border-color: var(--cyan); }
    .hidden { display: none !important; }
    .message { padding: 15px; margin-bottom: 20px; border-left: 5px solid;
      font-weight: 600; animation: slideIn 0.3s; }
    @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } }
    .message.error { background: rgba(225,6,0,0.2); border-color: var(--red); color: #ff6b6b; }
    .message.success { background: rgba(0,245,255,0.2); border-color: var(--cyan); color: var(--cyan); }
    .logout { position: fixed; top: 20px; right: 20px; padding: 10px 20px;
      background: var(--gray); border: 2px solid var(--red); color: var(--white);
      cursor: pointer; font-weight: bold; text-transform: uppercase; z-index: 1000; }
    .user-info { position: fixed; top: 80px; right: 20px; padding: 15px 20px;
      background: rgba(42,42,53,0.95); border: 2px solid var(--cyan);
      color: var(--cyan); font-weight: 600; z-index: 1000; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    table thead { background: var(--red); }
    table th { padding: 15px; text-align: left; text-transform: uppercase; font-weight: bold; }
    table td { padding: 12px; border-bottom: 1px solid rgba(192,192,200,0.2); }
    table tbody tr:hover { background: rgba(225,6,0,0.1); }
    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      .nav { flex-direction: column; gap: 10px; }
      .grid { grid-template-columns: 1fr; }
      .logout, .user-info { position: static; margin-bottom: 10px; width: 100%; }
    }
  </style>
</head>
<body>
  <button class="logout" id="btnLogout" style="display:none;">Cerrar Sesión</button>
  <div class="user-info" id="userInfo" style="display:none;"></div>

  <div class="container">
    <header class="header">
      <h1>🏎️ Quiniela F1 2026</h1>
      <p style="color: var(--silver); margin-top: 10px;">Predicciones de Carreras</p>
    </header>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="card" style="max-width: 500px; margin: 0 auto;">
        <h2 style="text-align: center; color: var(--cyan); margin-bottom: 30px;">Iniciar Sesión</h2>
        <div id="loginMsg"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label>PIN (4 dígitos)</label>
          <input type="password" id="loginPin" placeholder="1234" maxlength="4">
        </div>
        <button class="btn" onclick="login()">Entrar</button>
        <button class="btn" style="background: var(--gray); color: var(--white); border: 2px solid var(--silver); margin-top: 10px;" onclick="mostrarRegistro()">Crear Cuenta</button>
      </div>
    </div>

    <!-- REGISTRO -->
    <div id="registroForm" class="hidden">
      <div class="card" style="max-width: 500px; margin: 0 auto;">
        <h2 style="text-align: center; color: var(--cyan); margin-bottom: 30px;">Registro</h2>
        <div id="registroMsg"></div>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="regNombre" placeholder="Tu nombre">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label>PIN (4 dígitos)</label>
          <input type="password" id="regPin" placeholder="1234" maxlength="4">
        </div>
        <button class="btn" onclick="registrar()">Registrarse</button>
        <button class="btn" style="background: var(--gray); color: var(--white); border: 2px solid var(--silver); margin-top: 10px;" onclick="mostrarLogin()">Volver a Login</button>
      </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="appMain" class="hidden">
      <nav class="nav">
        <button class="btn-nav active" onclick="cambiarVista('dashboard')">Dashboard</button>
        <button class="btn-nav" onclick="cambiarVista('predicciones')">Mis Predicciones</button>
        <button class="btn-nav" onclick="cambiarVista('ver')">Ver Predicciones</button>
        <button class="btn-nav" onclick="cambiarVista('clasificacion')">Clasificación</button>
      </nav>

      <!-- DASHBOARD -->
      <div id="vista-dashboard">
        <h2 style="margin-bottom: 30px; color: var(--cyan);">📅 Calendario</h2>
        <div class="grid" id="calendarioGrid"></div>
      </div>

      <!-- PREDICCIONES -->
      <div id="vista-predicciones" class="hidden">
        <h2 style="margin-bottom: 30px; color: var(--cyan);">📋 Mis Predicciones</h2>
        <div id="misPrediccionesContent"></div>
      </div>

      <!-- VER PREDICCIONES -->
      <div id="vista-ver" class="hidden">
        <h2 style="margin-bottom: 30px; color: var(--cyan);">👁️ Ver Predicciones</h2>
        <div class="grid" id="verPrediccionesGrid"></div>
      </div>

      <!-- CLASIFICACIÓN -->
      <div id="vista-clasificacion" class="hidden">
        <h2 style="margin-bottom: 30px; color: var(--gold); text-align: center;">🏆 Clasificación General</h2>
        <div class="card">
          <table id="clasificacionTable">
            <thead><tr><th>Pos</th><th>Nombre</th><th>Puntos</th><th>Carreras</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyxJmWR5k-sw-d9E8PDrcSEqwjg8wcMTojsC5mG2IP9WlaWxiV59eyY8-Dn2D7mHsYsIg/exec';
    
    const PILOTOS = ['Alexander Albon', 'Fernando Alonso', 'Kimi Antonelli', 'Oliver Bearman', 'Gabriel Bortoleto', 'Valtteri Bottas', 'Franco Colapinto', 'Pierre Gasly', 'Isack Hadjar', 'Lewis Hamilton', 'Nico Hulkenberg', 'Liam Lawson', 'Charles Leclerc', 'Arvid Lindblad', 'Lando Norris', 'Esteban Ocon', 'Sergio Perez', 'Oscar Piastri', 'George Russell', 'Carlos Sainz', 'Lance Stroll', 'Max Verstappen', 'Sin abandono'].sort();
    
    const CARRERAS = [
      { id: 1, nombre: 'Gran Premio de Australia', pais: 'Australia', fecha: '08/03/2026', limite: '05/03/2026 20:00' },
      { id: 2, nombre: 'Gran Premio de China', pais: 'China', fecha: '15/03/2026', limite: '12/03/2026 20:00' },
      { id: 3, nombre: 'Gran Premio de Japón', pais: 'Japón', fecha: '29/03/2026', limite: '26/03/2026 20:00' },
      { id: 4, nombre: 'Gran Premio de Baréin', pais: 'Baréin', fecha: '12/04/2026', limite: '09/04/2026 20:00' },
      { id: 5, nombre: 'Gran Premio de Arabia Saudita', pais: 'Arabia Saudita', fecha: '19/04/2026', limite: '16/04/2026 20:00' },
      { id: 6, nombre: 'Gran Premio de Miami', pais: 'Estados Unidos', fecha: '03/05/2026', limite: '30/04/2026 20:00' },
      { id: 7, nombre: 'Gran Premio de Emilia-Romaña', pais: 'Italia', fecha: '24/05/2026', limite: '21/05/2026 20:00' },
      { id: 8, nombre: 'Gran Premio de Mónaco', pais: 'Mónaco', fecha: '07/06/2026', limite: '04/06/2026 20:00' },
      { id: 9, nombre: 'Gran Premio de Barcelona-Cataluña', pais: 'España', fecha: '14/06/2026', limite: '11/06/2026 20:00' },
      { id: 10, nombre: 'Gran Premio de Canadá', pais: 'Canadá', fecha: '24/05/2026', limite: '21/05/2026 20:00' },
      { id: 11, nombre: 'Gran Premio de Austria', pais: 'Austria', fecha: '28/06/2026', limite: '25/06/2026 20:00' },
      { id: 12, nombre: 'Gran Premio de Gran Bretaña', pais: 'Reino Unido', fecha: '05/07/2026', limite: '02/07/2026 20:00' },
      { id: 13, nombre: 'Gran Premio de Bélgica', pais: 'Bélgica', fecha: '19/07/2026', limite: '16/07/2026 20:00' },
      { id: 14, nombre: 'Gran Premio de Hungría', pais: 'Hungría', fecha: '26/07/2026', limite: '23/07/2026 20:00' },
      { id: 15, nombre: 'Gran Premio de los Países Bajos', pais: 'Países Bajos', fecha: '23/08/2026', limite: '20/08/2026 20:00' },
      { id: 16, nombre: 'Gran Premio de Italia', pais: 'Italia', fecha: '06/09/2026', limite: '03/09/2026 20:00' },
      { id: 17, nombre: 'Gran Premio de Azerbaiyán', pais: 'Azerbaiyán', fecha: '26/09/2026', limite: '23/09/2026 20:00' },
      { id: 18, nombre: 'Gran Premio de Singapur', pais: 'Singapur', fecha: '11/10/2026', limite: '08/10/2026 20:00' },
      { id: 19, nombre: 'Gran Premio de Estados Unidos', pais: 'Estados Unidos', fecha: '25/10/2026', limite: '22/10/2026 20:00' },
      { id: 20, nombre: 'Gran Premio de México', pais: 'México', fecha: '01/11/2026', limite: '29/10/2026 20:00' },
      { id: 21, nombre: 'Gran Premio de Brasil', pais: 'Brasil', fecha: '08/11/2026', limite: '05/11/2026 20:00' },
      { id: 22, nombre: 'Gran Premio de Las Vegas', pais: 'Estados Unidos', fecha: '21/11/2026', limite: '19/11/2026 20:00' },
      { id: 23, nombre: 'Gran Premio de Catar', pais: 'Catar', fecha: '29/11/2026', limite: '26/11/2026 20:00' },
      { id: 24, nombre: 'Gran Premio de Abu Dabi', pais: 'Emiratos Árabes', fecha: '06/12/2026', limite: '03/12/2026 20:00' },
    ];

    let usuario = JSON.parse(localStorage.getItem('sesion_f1') || 'null');

    function mostrarLogin() { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('registroForm').classList.add('hidden'); }
    function mostrarRegistro() { document.getElementById('registroForm').classList.remove('hidden'); document.getElementById('loginForm').classList.add('hidden'); }

    async function login() {
      const email = document.getElementById('loginEmail').value;
      const pin = document.getElementById('loginPin').value;
      const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: 'login', email, pin }) });
      const data = await resp.json();
      if (data.exito) {
        usuario = data.usuario;
        localStorage.setItem('sesion_f1', JSON.stringify(usuario));
        mostrarApp();
      } else {
        document.getElementById('loginMsg').innerHTML = `<div class="message error">${data.mensaje}</div>`;
      }
    }

    async function registrar() {
      const nombre = document.getElementById('regNombre').value;
      const email = document.getElementById('regEmail').value;
      const pin = document.getElementById('regPin').value;
      const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: 'registrar', nombre, email, pin }) });
      const data = await resp.json();
      if (data.exito) {
        usuario = data.usuario;
        localStorage.setItem('sesion_f1', JSON.stringify(usuario));
        mostrarApp();
      } else {
        document.getElementById('registroMsg').innerHTML = `<div class="message error">${data.mensaje}</div>`;
      }
    }

    function mostrarApp() {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registroForm').classList.add('hidden');
      document.getElementById('appMain').classList.remove('hidden');
      document.getElementById('btnLogout').style.display = 'block';
      document.getElementById('userInfo').style.display = 'block';
      document.getElementById('userInfo').textContent = '🏁 ' + usuario.nombre;
      cargarDashboard();
    }

    function cambiarVista(vista) {
      document.querySelectorAll('[id^="vista-"]').forEach(v => v.classList.add('hidden'));
      document.getElementById('vista-' + vista).classList.remove('hidden');
      document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      
      if (vista === 'predicciones') cargarMisPredicciones();
      if (vista === 'ver') cargarVerPredicciones();
      if (vista === 'clasificacion') cargarClasificacion();
    }

    async function cargarDashboard() {
      const ahora = new Date();
      const carrerasAbiertas = CARRERAS.filter(c => {
        const fechaLimite = new Date(c.limite);
        return ahora < fechaLimite;
      });

      if (carrerasAbiertas.length === 0) {
        document.getElementById('calendarioGrid').innerHTML = '<div class="card">Todas las carreras de la temporada han cerrado. ¡Espera la próxima temporada!</div>';
        return;
      }

      const proximaCarrera = carrerasAbiertas[0];
      let html = `
        <div class="card" style="grid-column: 1/-1; background: linear-gradient(135deg, var(--red), #a00400); border: 3px solid var(--gold); padding: 40px; text-align: center; margin-bottom: 30px;">
          <div style="font-size: 2.5rem; font-weight: bold; margin-bottom: 15px; color: var(--gold);">⏰ PRÓXIMA CARRERA</div>
          <div style="font-size: 2rem; font-weight: bold; margin-bottom: 20px;">${proximaCarrera.nombre}</div>
          <div style="font-size: 1.5rem; margin-bottom: 15px;">📍 ${proximaCarrera.pais}</div>
          <div style="font-size: 1.3rem; margin-bottom: 15px;">📅 ${proximaCarrera.fecha}</div>
          <div style="font-size: 1.3rem; margin-bottom: 20px;">⏰ Límite: ${proximaCarrera.limite}</div>
          <button class="btn" onclick="hacerPrediccion(${proximaCarrera.id})" style="background: var(--gold); color: var(--black); font-weight: bold; max-width: 400px; margin: 0 auto;">🎯 HACER PREDICCIÓN AHORA</button>
        </div>
      `;

      const otrasCarreras = carrerasAbiertas.slice(1).map(c => `
        <div class="card-small" onclick="hacerPrediccion(${c.id})">
          <div style="font-size: 1.3rem; font-weight: bold; margin-bottom: 10px;">${c.nombre}</div>
          <div style="color: var(--silver);">📍 ${c.pais}</div>
          <div style="color: var(--silver); margin-top: 5px;">📅 ${c.fecha}</div>
          <div style="color: var(--silver); margin-top: 5px;">⏰ ${c.limite}</div>
        </div>
      `).join('');

      html += otrasCarreras.length > 0 ? `<h3 style="grid-column: 1/-1; margin-top: 30px; margin-bottom: 20px; color: var(--cyan);">Otras Carreras Disponibles</h3>${otrasCarreras}` : '';

      document.getElementById('calendarioGrid').innerHTML = html;
    }

    function hacerPrediccion(carreraId) {
      const carrera = CARRERAS.find(c => c.id === carreraId);
      const form = `
        <button class="btn" style="background: var(--gray); color: var(--white); border: 2px solid var(--silver); margin-bottom: 20px; width: auto; padding: 10px 20px;" onclick="volverDashboard()">← Volver</button>
        <div class="card">
          <h2 style="color: var(--red); margin-bottom: 20px;">${carrera.nombre}</h2>
          <div style="color: var(--silver); margin-bottom: 30px;">📍 ${carrera.pais} | 📅 ${carrera.fecha}</div>
          <div class="grid">
            <div>
              <label>🥇 Posición 1</label>
              <select id="p1" required>${PILOTOS.filter(p => p !== 'Sin abandono').map(p => `<option>${p}</option>`).join('')}</select>
            </div>
            <div>
              <label>🥈 Posición 2</label>
              <select id="p2">${PILOTOS.filter(p => p !== 'Sin abandono').map(p => `<option>${p}</option>`).join('')}</select>
            </div>
            <div>
              <label>🥉 Posición 3</label>
              <select id="p3">${PILOTOS.filter(p => p !== 'Sin abandono').map(p => `<option>${p}</option>`).join('')}</select>
            </div>
            <div>
              <label>🏁 Pole</label>
              <select id="pole">${PILOTOS.filter(p => p !== 'Sin abandono').map(p => `<option>${p}</option>`).join('')}</select>
            </div>
            <div>
              <label>⚡ Vuelta Rápida</label>
              <select id="vuelta">${PILOTOS.filter(p => p !== 'Sin abandono').map(p => `<option>${p}</option>`).join('')}</select>
            </div>
            <div>
              <label>💥 Abandono</label>
              <select id="abandono">${PILOTOS.map(p => `<option>${p}</option>`).join('')}</select>
            </div>
          </div>
          <button class="btn" style="margin-top: 30px;" onclick="guardarPrediccion(${carreraId})">💾 Guardar</button>
        </div>
      `;
      document.getElementById('vista-dashboard').innerHTML = form;
    }

    function volverDashboard() {
      cargarDashboard();
    }

    async function guardarPrediccion(carreraId) {
      const pred = {
        p1: document.getElementById('p1').value,
        p2: document.getElementById('p2').value,
        p3: document.getElementById('p3').value,
        pole: document.getElementById('pole').value,
        vueltaRapida: document.getElementById('vuelta').value,
        abandono: document.getElementById('abandono').value
      };
      const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: 'guardar_prediccion', usuarioId: usuario.id, carreraId, ...pred }) });
      const data = await resp.json();
      if (data.exito) {
        alert('Predicción guardada');
        cargarDashboard();
      } else alert(data.mensaje);
    }

    async function cargarMisPredicciones() {
      const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: 'obtener_mis_predicciones', usuarioId: usuario.id }) });
      const data = await resp.json();
      if (data.exito && data.predicciones.length > 0) {
        const html = data.predicciones.map(p => `
          <div class="card">
            <h3>${p.carreraNombre}</h3>
            <div class="grid">
              <div><strong>🥇 P1:</strong> ${p.prediccion.p1}</div>
              <div><strong>🥈 P2:</strong> ${p.prediccion.p2}</div>
              <div><strong>🥉 P3:</strong> ${p.prediccion.p3}</div>
              <div><strong>🏁 Pole:</strong> ${p.prediccion.pole}</div>
              <div><strong>⚡ Vuelta:</strong> ${p.prediccion.vueltaRapida}</div>
              <div><strong>💥 Abandono:</strong> ${p.prediccion.abandono}</div>
            </div>
          </div>
        `).join('');
        document.getElementById('misPrediccionesContent').innerHTML = html;
      } else {
        document.getElementById('misPrediccionesContent').innerHTML = '<div class="card">Aún no has hecho predicciones</div>';
      }
    }

    async function cargarVerPredicciones() {
      const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: 'obtener_calendario' }) });
      const data = await resp.json();
      if (data.exito) {
        const cerradas = data.carreras.filter(c => !c.prediccionAbierta);
        const html = cerradas.map(c => `
          <div class="card-small" onclick="verDetallesPredicciones(${c.id})">
            <div style="font-size: 1.2rem; font-weight: bold;">${c.nombre}</div>
            <div style="color: var(--silver); margin-top: 5px;">📍 ${c.pais}</div>
            <div style="color: var(--silver); margin-top: 5px;">📅 ${c.fecha}</div>
            <div style="color: var(--cyan); margin-top: 10px; font-weight: bold;">${c.yaTermino ? '📊 Ver Puntos' : '👥 Ver Predicciones'}</div>
          </div>
        `).join('');
        document.getElementById('verPrediccionesGrid').innerHTML = html || '<div class="card">No hay carreras cerradas</div>';
      }
    }

    async function verDetallesPredicciones(carreraId) {
      const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: 'obtener_predicciones_carrera', carreraId }) });
      const data = await resp.json();
      if (data.exito) {
        const carrera = CARRERAS.find(c => c.id === carreraId);
        let html = `<button onclick="cargarVerPredicciones()" class="btn" style="background: var(--gray); margin-bottom: 20px; width: auto;">← Volver</button>
          <div class="card">
          <h2 style="color: var(--red); margin-bottom: 20px;">${carrera.nombre}</h2>`;
        
        if (data.resultadoReal) {
          html += `<div style="background: var(--red); padding: 20px; margin-bottom: 30px;">
            <h3 style="text-align: center; margin-bottom: 20px;">🏁 Resultado Oficial</h3>
            <div class="grid">
              <div style="text-align: center;"><strong>P1:</strong> ${data.resultadoReal.p1}</div>
              <div style="text-align: center;"><strong>P2:</strong> ${data.resultadoReal.p2}</div>
              <div style="text-align: center;"><strong>P3:</strong> ${data.resultadoReal.p3}</div>
              <div style="text-align: center;"><strong>Pole:</strong> ${data.resultadoReal.pole}</div>
              <div style="text-align: center;"><strong>Vuelta:</strong> ${data.resultadoReal.vueltaRapida}</div>
              <div style="text-align: center;"><strong>Abandono:</strong> ${data.resultadoReal.abandono}</div>
            </div>
          </div>`;
        }

        data.predicciones.forEach((p, idx) => {
          html += `<div style="background: var(--gray); padding: 20px; margin-bottom: 15px; border: 2px solid var(--cyan);">
            <h4 style="margin-bottom: 15px;">${p.nombre} ${p.puntos ? `<span style="float: right; color: var(--gold); font-size: 1.5rem;">${p.puntos.total} PTS</span>` : ''}</h4>
            <div class="grid">
              <div><strong>🥇 P1:</strong> ${p.prediccion.p1} ${p.puntos ? `<div style="color: var(--cyan);">+${p.puntos.p1}</div>` : ''}</div>
              <div><strong>🥈 P2:</strong> ${p.prediccion.p2} ${p.puntos ? `<div style="color: var(--cyan);">+${p.puntos.p2}</div>` : ''}</div>
              <div><strong>🥉 P3:</strong> ${p.prediccion.p3} ${p.puntos ? `<div style="color: var(--cyan);">+${p.puntos.p3}</div>` : ''}</div>
              <div><strong>🏁 Pole:</strong> ${p.prediccion.pole} ${p.puntos ? `<div style="color: var(--cyan);">+${p.puntos.pole}</div>` : ''}</div>
              <div><strong>⚡ Vuelta:</strong> ${p.prediccion.vueltaRapida} ${p.puntos ? `<div style="color: var(--cyan);">+${p.puntos.vueltaRapida}</div>` : ''}</div>
              <div><strong>💥 Abandono:</strong> ${p.prediccion.abandono} ${p.puntos ? `<div style="color: var(--cyan);">+${p.puntos.abandono}</div>` : ''}</div>
            </div>
          </div>`;
        });
        html += '</div>';
        document.getElementById('verPrediccionesGrid').innerHTML = html;
      }
    }

    async function cargarClasificacion() {
      const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ accion: 'obtener_clasificacion' }) });
      const data = await resp.json();
      if (data.exito) {
        const html = data.clasificacion.map(u => `
          <tr>
            <td style="font-weight: bold; font-size: 1.3rem;">${u.posicion === 1 ? '🥇' : u.posicion === 2 ? '🥈' : u.posicion === 3 ? '🥉' : u.posicion}</td>
            <td>${u.nombre}</td>
            <td style="color: var(--cyan); font-weight: bold;">${u.totalPuntos}</td>
            <td>${u.carrerasParticipadas}</td>
          </tr>
        `).join('');
        document.querySelector('#clasificacionTable tbody').innerHTML = html;
      }
    }

    document.getElementById('btnLogout').addEventListener('click', () => {
      localStorage.removeItem('sesion_f1');
      location.reload();
    });

    if (usuario) {
      mostrarApp();
    }
  </script>
</body>
</html>
